<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>street craps</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app"></div>

  <div id="ui">
    <div id="game-info">
      <div id="phase-display">COME OUT</div>
      <div id="point-display"></div>
      <div id="game-message">place your bet</div>
      <div id="rules-hint">drag to aim  &middot;  [space] forward  &middot;  [&uarr;]&nbsp;[&darr;] bet  &middot;  dice must hit the back wall</div>
    </div>

    <div id="dice-result"></div>

    <div id="npcs"></div>

    <div id="bottom-area">
      <div id="rogue-info">
        <div id="table-display"></div>
        <div id="run-status"></div>
        <div id="meta-foot">
          <span id="meta-display"></span>
          <span id="reroll-display"></span>
          <button id="perk-toggle">perks</button>
        </div>
      </div>
      <div id="table-progress">
        <div class="table-progress-fill"></div>
        <span class="table-progress-label"></span>
      </div>
      <div id="bonus-panel"></div>
      <div id="history-strip"></div>
      <div id="bottom-bar">
        <div id="money-bar">
          <div class="money-bar-section">
            <span class="money-bar-label">MONEY</span>
            <span class="money-bar-value" id="money-value">$100</span>
          </div>
          <span class="money-bar-divider">|</span>
          <div class="money-bar-section">
            <span class="money-bar-label">BET</span>
            <span class="money-bar-value" id="bet-value">$10</span>
          </div>
          <span class="money-bar-divider">|</span>
          <div class="money-bar-section win">
            <span class="money-bar-label">TO WIN</span>
            <span class="money-bar-value" id="payout-value">$20</span>
          </div>
        </div>
        <div id="bet-controls">
          <span id="bet-label">bet</span>
          <div id="bet-chips">
            <button class="bet-chip" data-amount="5">5</button>
            <button class="bet-chip" data-amount="10">10</button>
            <button class="bet-chip" data-amount="25">25</button>
            <button class="bet-chip" data-amount="50">50</button>
            <button class="bet-chip" data-amount="100">100</button>
          </div>
        </div>
        <div id="stats-display">
          <span id="roll-count">rolls: 0</span>
          <span id="win-count">wins: 0</span>
        </div>
      </div>
    </div>

    <div id="power-bar-bg" style="display:none;pointer-events:none">
      <div id="power-bar-fill"></div>
    </div>
  </div>

  <!-- Map Navigation Overlay -->
  <div id="map-overlay">
    <div class="map-panel">
      <div id="map-header">Choose Your Path</div>
      <div id="map-act-label"></div>
      <div id="map-floor-label"></div>
      <div id="map-nodes"></div>
    </div>
  </div>

  <!-- Pick-3 Overlay -->
  <div id="pick-overlay">
    <div id="pick-header">choose an upgrade</div>
    <div id="pick-cards"></div>
    <div id="pick-actions">
      <button id="pick-reroll" style="display:none">reroll</button>
      <button id="pick-skip">skip</button>
    </div>
  </div>

  <!-- Dice Pick Overlay -->
  <div id="dice-pick-overlay">
    <div id="dice-pick-header">pick 2 dice</div>
    <div id="dice-pick-slots"></div>
    <div id="dice-pick-actions">
      <button id="dice-pick-confirm" disabled>roll</button>
    </div>
  </div>

  <!-- Game Over Overlay -->
  <div id="game-over">
    <div id="game-over-content">
      <h2>tapped out</h2>
      <p>better luck next time</p>
      <button id="new-game-btn">new run</button>
    </div>
  </div>

  <!-- Result Card Overlay -->
  <div id="result-card">
    <div class="result-card">
      <div class="result-header"></div>
      <div class="result-breakdown"></div>
      <div class="result-net"></div>
    </div>
  </div>

  <!-- SHOP OVERLAY -->
  <div id="shop-overlay">
    <div class="shop-panel">
      <div class="shop-portrait">
        <div class="shop-avatar" id="shop-avatar"></div>
        <div class="shop-info">
          <div class="shop-npc-name" id="shop-npc-name"></div>
          <div class="shop-npc-greeting" id="shop-npc-greeting"></div>
        </div>
        <div class="shop-trust-badge" id="shop-trust-badge"></div>
      </div>
      <div class="shop-money" id="shop-money">Money: $0</div>
      <div class="shop-items" id="shop-items"></div>
      <button class="shop-leave-btn" id="shop-leave">Leave Shop</button>
    </div>
  </div>

  <!-- Vow Selection Overlay -->
  <div id="vow-select-overlay">
    <div id="vow-select-panel">
      <div id="vow-select-header">Choose Your Burden</div>
      <div id="vow-select-cards"></div>
      <div id="vow-select-actions">
        <button id="vow-skip-btn">No Vow</button>
      </div>
    </div>
  </div>

  <!-- Perk Overlay -->
  <div id="perk-overlay">
    <div id="perk-content">
      <div id="perk-title">perks</div>
      <div id="perk-list"></div>
      <button id="perk-close">close</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
